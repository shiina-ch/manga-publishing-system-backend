spring.profiles.default=local

spring.application.name=MangaSystemAndManagement
server.port=${SERVER_PORT:8386}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SQL_LOGGING_ENABLED:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=${SQL_FORMAT_SQL:false}

# Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# CORS and File Storage Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.storage.upload-directory=${UPLOAD_DIRECTORY}
app.storage.max-size=${UPLOAD_MAX_SIZE}

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_SIZE}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_SIZE}

# Optional Bootstrap Admin Configuration
app.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
